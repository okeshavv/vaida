version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./vaida.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENVIRONMENT=development
      - OTP_BYPASS=true
      - BLOCKCHAIN_ENABLED=true
    volumes:
      - ./data:/app/data
    restart: unless-stopped


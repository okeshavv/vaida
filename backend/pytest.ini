[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    auth: Authentication tests
    intake: Patient intake tests
    triage: AI triage tests
    vision: Image analysis tests
    brief: Doctor brief tests
    consult: Teleconsult tests
    epi: Epidemiological alert tests
    blockchain: Blockchain ledger tests
    classifier: Triage classifier unit tests
    offline: Offline sync tests
    eval: Triage evaluation / CI gate tests
    slow: Slow tests (external API calls)

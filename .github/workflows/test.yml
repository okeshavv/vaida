name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          ENVIRONMENT: development
          JWT_SECRET: ci-test-secret-not-production
          ENCRYPTION_KEY: ci-test-encryption-key-32chars!!
          OTP_BYPASS: "True"
          OTP_BYPASS_CODE: "123456"
          DATABASE_URL: sqlite:///./test_vaida.db
          UPLOADS_DIR: ./test_uploads
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false
